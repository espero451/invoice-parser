services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdfparser-app
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
    networks:
      - pdfparser

  nginx:
    image: nginx:1.27-alpine
    container_name: pdfparser-nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - pdfparser

networks:
  pdfparser:
    driver: bridge
